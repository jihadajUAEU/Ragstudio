name: Feature request
description: Suggest a Ragstudio improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or quality gap should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: proof
    attributes:
      label: Proof or evaluation impact
      description: How would we verify this works?
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This affects public product claims or proof packets.
        - label: This affects upload/auth/provider/security boundaries.
        - label: This requires documentation updates.
