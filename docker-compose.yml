services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ragstudio-backend
    environment:
      RAGSTUDIO_DATABASE_URL: postgresql+asyncpg://ragstudio:ragstudio@postgres:5432/ragstudio
      RAGSTUDIO_NEO4J_URI: bolt://neo4j:7687
      RAGSTUDIO_NEO4J_USERNAME: neo4j
      RAGSTUDIO_NEO4J_PASSWORD: ragstudio-password
      RAGSTUDIO_DATA_DIR: /data
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/src:/app/backend/src
      - ragstudio-backend-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ragstudio-worker
    command: python -m ragstudio.workers.index_worker
    restart: unless-stopped
    environment:
      RAGSTUDIO_DATABASE_URL: postgresql+asyncpg://ragstudio:ragstudio@postgres:5432/ragstudio
      RAGSTUDIO_NEO4J_URI: bolt://neo4j:7687
      RAGSTUDIO_NEO4J_USERNAME: neo4j
      RAGSTUDIO_NEO4J_PASSWORD: ragstudio-password
      RAGSTUDIO_DATA_DIR: /data
    volumes:
      - ./backend/src:/app/backend/src
      - ragstudio-backend-data:/data
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -m ragstudio.workers.index_worker --healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ragstudio-frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend/src:/app/frontend/src
      - ./frontend/index.html:/app/frontend/index.html
      - ./frontend/vite.config.ts:/app/frontend/vite.config.ts
    depends_on:
      - backend

  postgres:
    image: pgvector/pgvector:pg17
    container_name: ragstudio-postgres
    environment:
      POSTGRES_DB: ragstudio
      POSTGRES_USER: ragstudio
      POSTGRES_PASSWORD: ragstudio
    ports:
      - "55432:5432"
    volumes:
      - ragstudio-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragstudio -d ragstudio"]
      interval: 5s
      timeout: 5s
      retries: 20

  neo4j:
    image: neo4j:5-community
    container_name: ragstudio-neo4j
    environment:
      NEO4J_AUTH: neo4j/ragstudio-password
      NEO4J_dbms_security_auth__enabled: "true"
    ports:
      - "57474:7474"
      - "57687:7687"
    volumes:
      - ragstudio-neo4j-data:/data
      - ragstudio-neo4j-logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --tries=1 --spider http://127.0.0.1:7474 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  ragstudio-backend-data:
  ragstudio-postgres-data:
  ragstudio-neo4j-data:
  ragstudio-neo4j-logs:
